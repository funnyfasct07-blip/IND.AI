<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IND.AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #1a1a2e, #0b0b0f);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* glow background */
body::before {
  content: "";
  position: fixed;
  width: 500px;
  height: 500px;
  background: purple;
  filter: blur(200px);
  top: -100px;
  left: -100px;
  opacity: 0.3;
}

header {
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
}

.hero {
  font-size: 22px;
  color: #aaa;
}

.typing {
  color: #8f44fd;
  font-weight: bold;
}

.credits {
  background: #151520;
  display: inline-block;
  padding: 8px 16px;
  border-radius: 20px;
  margin: 20px 0;
}

input {
  width: 80%;
  padding: 15px;
  border-radius: 10px;
  border: none;
  margin-bottom: 20px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 20px;
}

button {
  padding: 18px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #6a5cff, #8f44fd);
  color: white;
  font-size: 15px;
  cursor: pointer;
}

.preview {
  padding: 20px;
}

.preview img, .preview video {
  width: 45%;
  margin: 10px;
  border-radius: 10px;
}

/* result */
.result {
  display: none;
  padding: 20px;
}

.fake-box {
  background: #151520;
  padding: 20px;
  border-radius: 10px;
}

footer {
  margin-top: 40px;
  padding: 20px;
  color: #aaa;
}
</style>
</head>

<body>

<header>IND.AI</header>

<div class="hero">
  Create <span id="typing" class="typing"></span>
</div>

<div class="credits">🔥 5 Free Credits Left</div>

<input type="text" placeholder="Aaj kya banana hai?">

<div class="buttons">
  <button onclick="generate()">🎨 Image</button>
  <button onclick="generate()">🎬 Video</button>
  <button onclick="generate()">🌐 Website</button>
  <button onclick="generate()">🤖 Ask AI</button>
  <button onclick="generate()">🧑‍🎭 Face Change</button>
  <button onclick="generate()">🎞 Image → Video</button>
</div>

<!-- PREVIEW -->
<div class="preview">
  <h3>✨ AI Creations</h3>
  
  <img src="https://picsum.photos/300/200?1">
  <img src="https://picsum.photos/300/200?2">
  <img src="https://picsum.photos/300/200?3">
  <img src="https://picsum.photos/300/200?4">

  <video controls src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
  <video controls src="https://www.w3schools.com/html/movie.mp4"></video>
</div>

<div class="result" id="result">
  <div class="fake-box">
    ⚡ AI generating... 🎬
  </div>
</div>

<footer>
  👤 Shrikunj Gondaliya <br>
  📧 shrigondaliya@gmail.com <br>
  📱 7861011533 <br><br>
  © 2026 IND.AI
</footer>

<script>
const words = ["Images", "Videos", "Websites", "Logos"];
let i=0, j=0, current="", isDeleting=false;

function type(){
  current = words[i];
  document.getElementById("typing").innerText = current.substring(0,j);

  if(!isDeleting && j<current.length){
    j++;
  } else if(isDeleting && j>0){
    j--;
  } else {
    isDeleting = !isDeleting;
    if(!isDeleting) i=(i+1)%words.length;
  }

  setTimeout(type, 200); // slow animation
}
type();

function generate(){
  document.getElementById("result").style.display="block";
}
</script>

</body>
</html>
