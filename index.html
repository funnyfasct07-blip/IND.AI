<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IND.AI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: #000;
  color: white;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
}

.menu {
  font-size: 24px;
  cursor: pointer;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  left: -260px;
  top: 0;
  width: 260px;
  height: 100%;
  background: #111;
  padding: 20px;
  transition: 0.3s;
  z-index: 1000;
}

.sidebar a {
  display: block;
  padding: 12px 0;
  color: white;
  text-decoration: none;
  border-bottom: 1px solid #222;
}

/* LOGIN BUTTON */
.login-btn {
  margin-top: 20px;
  padding: 12px;
  border-radius: 10px;
  background: linear-gradient(90deg,#ff00cc,#3333ff);
  text-align: center;
  cursor: pointer;
}

/* LOGIN POPUP */
.login-box {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #111;
  padding: 20px;
  border-radius: 15px;
  display: none;
  width: 90%;
  max-width: 300px;
  z-index: 2000;
}

.login-box input {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

.login-box button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(90deg,#ff00cc,#3333ff);
  color: white;
}

/* HERO */
.hero {
  width: 100%;
  height: 320px;
  background: url('https://picsum.photos/800/600?blur=3') center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* TEXT */
.hero h2 {
  font-size: 34px;
  background: linear-gradient(90deg, #fff, #ff00cc, #00ffff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: glow 3s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #ff00cc; }
  to { text-shadow: 0 0 25px #00ffff; }
}

/* BOX */
.box {
  width: 95%;
  max-width: 420px;
  background: rgba(0,0,0,0.6);
  padding: 15px;
  border-radius: 20px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
}

.toggle {
  display: flex;
  gap: 5px;
  margin-top: 10px;
}

.toggle button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #222;
  color: white;
}

.generate {
  margin-top: 12px;
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  background: linear-gradient(90deg,#ff00cc,#3333ff);
  color: white;
}

/* TOOLS */
.tools {
  display: flex;
  overflow-x: auto;
  padding: 15px;
  gap: 10px;
}

.tool {
  background: #111;
  padding: 15px;
  border-radius: 15px;
  min-width: 90px;
  text-align: center;
}

/* GALLERY */
.gallery {
  padding: 15px;
}

.gallery img {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 12px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #aaa;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="menu" onclick="toggleMenu()">☰</div>
  <div>IND.AI</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="menu">
  <a href="#">🏠 Home</a>
  <a href="#">🎨 Image</a>
  <a href="#">🎬 Video</a>
  <a href="#">🎤 Voice</a>
  <a href="#">🧑‍🎭 Face Swap</a>
  <a href="#">💎 Premium</a>

  <!-- LOGIN BUTTON -->
  <div class="login-btn" onclick="openLogin()">Login</div>
</div>

<!-- LOGIN POPUP -->
<div class="login-box" id="loginBox">
  <h3>Login</h3>
  <input placeholder="Email">
  <input placeholder="Password" type="password">
  <button>Login</button>
</div>

<!-- HERO -->
<div class="hero">
  <h2>Yours to Create</h2>

  <div class="box">
    <input placeholder="Type a prompt...">

    <div class="toggle">
      <button>Image</button>
      <button>Video</button>
      <button>Voice</button>
    </div>

    <button class="generate">Generate 🚀</button>
  </div>
</div>

<!-- TOOLS -->
<div class="tools">
  <div class="tool">Image</div>
  <div class="tool">Video</div>
  <div class="tool">Voice</div>
  <div class="tool">Upscale</div>
  <div class="tool">Face</div>
</div>

<!-- GALLERY -->
<div class="gallery">
  <img src="https://picsum.photos/400/500?1">
  <img src="https://picsum.photos/400/500?2">
  <img src="https://picsum.photos/400/500?3">
</div>

<!-- FOOTER -->
<footer>
  👤 Shrikunj Gondaliya <br>
  📧 shrigondaliya@gmail.com <br>
  📱 7861011533
</footer>

<script>
function toggleMenu(){
  let menu = document.getElementById("menu");
  menu.style.left = menu.style.left === "0px" ? "-260px" : "0px";
}

function openLogin(){
  document.getElementById("loginBox").style.display = "block";
}
</script>

</body>
  </html>
