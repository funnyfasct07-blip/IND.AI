<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IND.AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #111, #000);
  color: white;
}

/* NAVBAR */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.nav button {
  margin-left: 10px;
  padding: 8px 15px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
}

.login {
  background: #222;
  color: white;
}

.start {
  background: linear-gradient(90deg,#ff00cc,#3333ff);
  color: white;
}

/* HERO */
.hero {
  text-align: center;
  margin-top: 40px;
}

.hero h1 {
  font-size: 32px;
}

.gradient {
  background: linear-gradient(90deg,#ff00cc,#00ffff);
  -webkit-background-clip: text;
  color: transparent;
}

/* CATEGORY */
.categories {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 20px;
}

.cat {
  background: #111;
  padding: 10px 15px;
  border-radius: 20px;
  white-space: nowrap;
}

/* CARDS */
.cards {
  display: flex;
  overflow-x: auto;
  padding: 20px;
  gap: 15px;
}

.card {
  min-width: 250px;
  background: #111;
  border-radius: 15px;
  overflow: hidden;
}

.card img {
  width: 100%;
}

.card h3 {
  padding: 10px;
}

/* BUTTON GRID */
.buttons {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
  padding: 20px;
}

button.tool {
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg,#6a5cff,#8f44fd);
  color: white;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #aaa;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">IND.AI</div>
  <div>
    <button class="login">Login</button>
    <button class="start">Start Free</button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>What would you like to <span class="gradient">create today?</span></h1>
</div>

<!-- CATEGORY -->
<div class="categories">
  <div class="cat">Image</div>
  <div class="cat">Video</div>
  <div class="cat">Voice</div>
  <div class="cat">Website</div>
  <div class="cat">Logo</div>
  <div class="cat">Face Swap</div>
</div>

<!-- CARDS -->
<div class="cards">
  <div class="card">
    <img src="https://picsum.photos/300/200?1">
    <h3>Create Image</h3>
  </div>
  <div class="card">
    <img src="https://picsum.photos/300/200?2">
    <h3>Create Video</h3>
  </div>
  <div class="card">
    <img src="https://picsum.photos/300/200?3">
    <h3>AI Voice</h3>
  </div>
</div>

<!-- BUTTONS -->
<div class="buttons">
  <button class="tool">🎨 Image</button>
  <button class="tool">🎬 Video</button>
  <button class="tool">🎤 Voice</button>
  <button class="tool">🌐 Website</button>
  <button class="tool">🧑‍🎭 Face Change</button>
  <button class="tool">🎞 Image → Video</button>
</div>

<!-- FOOTER -->
<footer>
  👤 Shrikunj Gondaliya <br>
  📧 shrigondaliya@gmail.com <br>
  📱 7861011533 <br><br>
  © 2026 IND.AI
</footer>

</body>
</html>
