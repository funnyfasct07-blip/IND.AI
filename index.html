<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IND.AI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: #000;
  color: white;
  overflow-x: hidden;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
}

.menu {
  font-size: 24px;
  cursor: pointer;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  left: -260px;
  top: 0;
  width: 260px;
  height: 100%;
  background: #111;
  padding: 20px;
  transition: 0.3s;
  z-index: 1000;
}

.sidebar a {
  display: block;
  padding: 12px 0;
  color: white;
  text-decoration: none;
  border-bottom: 1px solid #222;
}

/* HERO */
.hero {
  width: 100%;
  height: 320px;
  background: url('https://picsum.photos/800/600?blur=3') center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* 🔥 PREMIUM TEXT */
.hero h2 {
  font-size: 34px;
  font-weight: bold;
  text-align: center;

  background: linear-gradient(90deg, #ffffff, #ff00cc, #00ffff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow: 0 0 10px rgba(255,255,255,0.8),
               0 0 20px rgba(255,0,200,0.7),
               0 0 30px rgba(0,255,255,0.7);

  animation: glowText 3s infinite alternate;

  padding: 5px 15px;
  border-radius: 10px;
  backdrop-filter: blur(10px);
  background-color: rgba(0,0,0,0.3);
}

/* Glow Animation */
@keyframes glowText {
  0% {
    text-shadow: 0 0 5px #fff,
                 0 0 10px #ff00cc,
                 0 0 15px #00ffff;
  }
  100% {
    text-shadow: 0 0 20px #fff,
                 0 0 30px #ff00cc,
                 0 0 40px #00ffff;
  }
}

/* GLASS BOX */
.box {
  width: 95%;
  max-width: 420px;
  backdrop-filter: blur(20px);
  background: rgba(0,0,0,0.6);
  padding: 15px;
  border-radius: 20px;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}

/* TOGGLE */
.toggle {
  display: flex;
  gap: 5px;
}

.toggle button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #222;
  color: white;
}

/* GENERATE BUTTON */
.generate {
  margin-top: 12px;
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  color: white;
  background: linear-gradient(90deg,#ff00cc,#3333ff);
  box-shadow: 0 0 15px rgba(255,0,200,0.6);
  transition: 0.3s;
}

.generate:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(255,0,200,1);
}

/* TOOLS */
.tools {
  display: flex;
  overflow-x: auto;
  padding: 15px;
  gap: 10px;
}

.tool {
  background: #111;
  padding: 15px;
  border-radius: 15px;
  min-width: 90px;
  text-align: center;
}

/* GALLERY */
.gallery {
  padding: 15px;
}

.gallery img {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 12px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #aaa;
}
</style>

</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="menu" onclick="toggleMenu()">☰</div>
  <div>IND.AI</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="menu">
  <a href="#">🏠 Home</a>
  <a href="#">🎨 Image</a>
  <a href="#">🎬 Video</a>
  <a href="#">🎤 Voice</a>
  <a href="#">🧑‍🎭 Face Swap</a>
  <a href="#">💎 Premium</a>
</div>

<!-- HERO -->
<div class="hero">
  <h2>Yours to Create</h2>

  <div class="box">
    <input placeholder="Type a prompt...">

    <div class="toggle">
      <button>Image</button>
      <button>Video</button>
      <button>Voice</button>
    </div>

    <button class="generate">Generate 🚀</button>
  </div>
</div>

<!-- TOOLS -->
<div class="tools">
  <div class="tool">Image</div>
  <div class="tool">Video</div>
  <div class="tool">Voice</div>
  <div class="tool">Upscale</div>
  <div class="tool">Face</div>
</div>

<!-- GALLERY -->
<div class="gallery">
  <img src="https://picsum.photos/400/500?1">
  <img src="https://picsum.photos/400/500?2">
  <img src="https://picsum.photos/400/500?3">
</div>

<!-- FOOTER -->
<footer>
  👤 Shrikunj Gondaliya <br>
  📧 shrigondaliya@gmail.com <br>
  📱 7861011533
</footer>

<script>
function toggleMenu(){
  let menu = document.getElementById("menu");
  menu.style.left = menu.style.left === "0px" ? "-260px" : "0px";
}
</script>

</body>
</html>
