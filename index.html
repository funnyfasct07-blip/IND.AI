<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IND.AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #000;
  color: white;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 15px;
}

.menu {
  font-size: 24px;
  cursor: pointer;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  left: -250px;
  top: 0;
  width: 250px;
  height: 100%;
  background: #111;
  padding: 20px;
  transition: 0.3s;
}

.sidebar a {
  display: block;
  padding: 10px 0;
  color: white;
  text-decoration: none;
}

/* HERO */
.hero {
  background: url('https://picsum.photos/800/600?blur=3') center/cover;
  height: 300px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* GLASS BOX */
.box {
  backdrop-filter: blur(20px);
  background: rgba(0,0,0,0.6);
  padding: 15px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

/* TOGGLE */
.toggle {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.toggle button {
  flex: 1;
  margin: 2px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #222;
  color: white;
}

.generate {
  margin-top: 10px;
  background: linear-gradient(90deg,#ff00cc,#3333ff);
}

/* TOOLS */
.tools {
  display: flex;
  overflow-x: auto;
  padding: 15px;
  gap: 10px;
}

.tool {
  background: #111;
  padding: 15px;
  border-radius: 15px;
  min-width: 80px;
  text-align: center;
}

/* GALLERY */
.gallery {
  padding: 15px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #aaa;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="menu" onclick="toggleMenu()">☰</div>
  <div>IND.AI</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="menu">
  <a href="#">Home</a>
  <a href="#">Image</a>
  <a href="#">Video</a>
  <a href="#">Voice</a>
  <a href="#">Face Swap</a>
  <a href="#">Premium</a>
</div>

<!-- HERO -->
<div class="hero">
  <h2>Yours to Create</h2>

  <div class="box">
    <input placeholder="Type a prompt...">

    <div class="toggle">
      <button>Image</button>
      <button>Video</button>
      <button>Voice</button>
    </div>

    <button class="generate">Generate 🚀</button>
  </div>
</div>

<!-- TOOLS -->
<div class="tools">
  <div class="tool">Image</div>
  <div class="tool">Video</div>
  <div class="tool">Voice</div>
  <div class="tool">Upscale</div>
  <div class="tool">Face</div>
</div>

<!-- GALLERY -->
<div class="gallery">
  <img src="https://picsum.photos/400/500?1">
  <img src="https://picsum.photos/400/500?2">
  <img src="https://picsum.photos/400/500?3">
</div>

<!-- FOOTER -->
<footer>
  👤 Shrikunj Gondaliya <br>
  📧 shrigondaliya@gmail.com <br>
  📱 7861011533
</footer>

<script>
function toggleMenu(){
  let menu = document.getElementById("menu");
  menu.style.left = menu.style.left === "0px" ? "-250px" : "0px";
}
</script>

</body>
</html>
